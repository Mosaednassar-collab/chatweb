<!DOCTYPE html>
<html>
<head>
    <title>Multi-Room Chat</title>
</head>
<body>
    <h2>اختر غرفة</h2>
    <input id="room" placeholder="اسم الغرفة">
    <button onclick="joinRoom()">دخول</button>

    <div id="chat" style="display:none;">
        <h3 id="roomName"></h3>
        <div id="messages"></div>
        <input id="msg" placeholder="اكتب رسالة">
        <button onclick="sendMessage()">إرسال</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentRoom = "";

        function joinRoom() {
            currentRoom = document.getElementById("room").value;
            socket.emit("joinRoom", currentRoom);
            document.getElementById("roomName").innerText = "الغرفة: " + currentRoom;
            document.getElementById("chat").style.display = "block";
        }

        function sendMessage() {
            const msg = document.getElementById("msg").value;
            socket.emit("chatMessage", { room: currentRoom, message: msg });
        }

        socket.on("chatMessage", (msg) => {
            const messages = document.getElementById("messages");
            messages.innerHTML += "<p>" + msg + "</p>";
        });
    </script>
</body>
</html>
